server:
  # Overridden at startup: -Dserver.port=8081 / 8082 / 8083 for each instance
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: product-service   # <-- SAME name across all instances. This is what lets
                             #     Eureka group them together as one logical service.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Without this, Eureka may treat multiple instances on localhost as one entry.
    instance-id: ${spring.application.name}:${server.port}:${random.value}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
